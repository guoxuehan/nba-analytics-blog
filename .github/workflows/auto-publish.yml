name: Auto Publish Articles

on:
  schedule:
    - cron: '0 21 * * *'  # JST 06:00（UTC 21:00 前日）
    - cron: '0 9 * * *'   # JST 18:00（UTC 09:00）
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run daily pipeline
        run: npx tsx scripts/daily-pipeline.ts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_API_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Commit new thumbnails
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/images/thumbnails/
          git diff --cached --quiet || git commit -m "Add: new article thumbnails"
          git push

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: publish-logs
          path: logs/
          retention-days: 30
